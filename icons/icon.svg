<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#04162a"/>
      <stop offset="100%" style="stop-color:#020e1e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="48" height="48" rx="12" ry="12" fill="url(#bgGrad)"/>
  
  <!-- Border -->
  <rect width="48" height="48" rx="12" ry="12" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.25"/>
  
  <!-- Three chevron arrows (scaled up from 16x16 to 48x48) -->
  <!-- Arrow 1 (top, most opaque) -->
  <polyline
    points="9,9 24,21 39,9"
    fill="none"
    stroke="#00d4ff"
    stroke-width="5.4"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="1"
  />
  <!-- Arrow 2 (middle) -->
  <polyline
    points="9,21 24,33 39,21"
    fill="none"
    stroke="#00d4ff"
    stroke-width="5.4"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.55"
  />
  <!-- Arrow 3 (bottom, most faded) -->
  <polyline
    points="9,33 24,45 39,33"
    fill="none"
    stroke="#00d4ff"
    stroke-width="5.4"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.2"
  />
</svg>
